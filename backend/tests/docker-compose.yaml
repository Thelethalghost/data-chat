services:
  db:
    image: postgres:15
    container_name: askcn-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: askcn
    ports:
      - "5432:5432"
    volumes:
      - askcn_pgdata:/var/lib/postgresql/data
      - ../testdb/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

volumes:
  askcn_pgdata:
